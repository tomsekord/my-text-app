<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Custom Text</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      font-family: Arial, sans-serif;
    }

    #sidebar {
      width: 20%;
      min-width: 180px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: #f5f5f5;
      border-right: 1px solid #ddd;
      box-sizing: border-box;
    }

    #sidebar h2 {
      margin: 0 0 8px;
      font-size: 1rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #sidebar label {
      font-size: 0.9rem;
      color: #444;
      margin-bottom: -8px;
    }

    input[type="text"] {
      padding: 10px;
      font-size: 1rem;
      width: 100%;
      box-sizing: border-box;
    }

    input[type="color"] {
      width: 100%;
      height: 44px;
      border: 1px solid #ccc;
      cursor: pointer;
      background: none;
      padding: 2px;
      box-sizing: border-box;
    }

    #preview {
      width: 80%;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #ffffff;
      transition: background-color 0.2s ease;
    }

    #output {
      font-size: 4rem;
      text-align: center;
      padding: 24px;
      color: #000000;
    }
  </style>
</head>
<body>

  <div id="sidebar">
    <h2>Settings</h2>

    <label for="textInput">Text</label>
    <input type="text" id="textInput" placeholder="Enter your text">

    <label for="textColor">Text color</label>
    <input type="color" id="textColor" value="#000000">

    <label for="bgColor">Background color</label>
    <input type="color" id="bgColor" value="#ffffff">
  </div>

  <div id="preview">
    <h1 id="output"></h1>
  </div>

  <script>
    function updatePreview() {
      const output = document.getElementById('output');
      output.textContent = document.getElementById('textInput').value;
      output.style.color = document.getElementById('textColor').value;
      document.getElementById('preview').style.backgroundColor = document.getElementById('bgColor').value;
    }

    document.getElementById('textInput').addEventListener('input', updatePreview);
    document.getElementById('textColor').addEventListener('input', updatePreview);
    document.getElementById('bgColor').addEventListener('input', updatePreview);
  </script>

</body>
</html>
